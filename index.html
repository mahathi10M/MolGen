<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MolGen — Drug Molecule Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Cabinet+Grotesk:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s50:#f0f9ff;--s100:#e0f2fe;--s200:#bae6fd;--s300:#7dd3fc;
  --s400:#38bdf8;--s500:#0ea5e9;--s600:#0284c7;--s700:#0369a1;
  --s800:#075985;--s900:#0c4a6e;
  --ink:#0c3349;--muted:#3b7ea3;
  --glass:rgba(255,255,255,0.58);--gb:rgba(255,255,255,0.82);
}
html,body{min-height:100vh;font-family:'Cabinet Grotesk',sans-serif;background:var(--s50);color:var(--ink);overflow-x:hidden;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 90% 70% at 15% 5%,#bae6fd55,transparent 55%),
    radial-gradient(ellipse 70% 80% at 85% 95%,#7dd3fc44,transparent 55%),
    radial-gradient(ellipse 60% 60% at 55% 40%,#e0f2fe70,transparent 50%),
    linear-gradient(170deg,#f0f9ff,#e0f2fe 40%,#f0f9ff);
  animation:bgd 18s ease-in-out infinite alternate;
}
@keyframes bgd{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(10deg)}}
.app{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 1.5rem 6rem;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1.6rem 0;border-bottom:1px solid rgba(186,230,253,0.45);animation:fi 0.5s ease both;}
.logo{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--s700);letter-spacing:-0.5px;}
.logo span{color:var(--s400);}
.nav-tag{font-family:'DM Mono',monospace;font-size:0.68rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--s600);background:rgba(14,165,233,0.08);border:1px solid rgba(14,165,233,0.2);padding:0.38rem 1rem;border-radius:50px;}

/* HERO */
.hero{padding:5rem 0 3rem;text-align:center;animation:hi 0.9s cubic-bezier(0.16,1,0.3,1) both;}
.eyebrow{font-family:'DM Mono',monospace;font-size:0.66rem;letter-spacing:4px;text-transform:uppercase;color:var(--s500);margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;gap:0.7rem;}
.eyebrow::before,.eyebrow::after{content:'';display:block;width:28px;height:1px;background:var(--s300);}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2.8rem,7vw,5.8rem);font-weight:800;line-height:1.0;letter-spacing:-3px;background:linear-gradient(145deg,var(--s800),var(--s600) 40%,var(--s400) 80%,var(--s300));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.4rem;}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--s500),var(--s300));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:1rem;font-weight:400;color:var(--muted);max-width:500px;margin:0 auto;line-height:1.75;}
.hero-stats{display:flex;align-items:center;justify-content:center;gap:2.5rem;margin-top:3rem;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-n{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:var(--s700);letter-spacing:-1px;}
.stat-l{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--s400);margin-top:0.15rem;}
.sdiv{width:1px;height:36px;background:var(--s200);}

/* GLASS */
.gl{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1.5px solid var(--gb);border-radius:28px;box-shadow:0 8px 48px rgba(3,105,161,0.09),inset 0 1px 0 rgba(255,255,255,0.6);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),box-shadow 0.3s;}
.gl:hover{transform:translateY(-3px);box-shadow:0 20px 60px rgba(3,105,161,0.14),inset 0 1px 0 rgba(255,255,255,0.6);}

/* INPUT */
.icard{padding:2.5rem;margin-bottom:2rem;animation:fu 0.7s 0.15s ease both;}
.lbl{font-family:'DM Mono',monospace;font-size:0.62rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--s500);margin-bottom:0.55rem;display:block;}
.srow{display:flex;gap:0.75rem;align-items:stretch;}
.sinput{flex:1;background:rgba(255,255,255,0.72);border:1.5px solid var(--s200);border-radius:16px;padding:1rem 1.3rem;font-family:'DM Mono',monospace;font-size:0.92rem;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;}
.sinput:focus{border-color:var(--s400);background:rgba(255,255,255,0.9);box-shadow:0 0 0 4px rgba(14,165,233,0.12);}
.sinput::placeholder{color:var(--s300);}
.epills{display:flex;gap:0.45rem;flex-wrap:wrap;margin:0.9rem 0 1.4rem;}
.ep{font-family:'DM Mono',monospace;font-size:0.71rem;font-weight:500;padding:0.32rem 0.9rem;background:rgba(14,165,233,0.07);border:1px solid rgba(14,165,233,0.2);border-radius:50px;color:var(--s700);cursor:pointer;transition:all 0.15s;}
.ep:hover{background:rgba(14,165,233,0.15);border-color:var(--s400);}
.ep.on{background:rgba(14,165,233,0.18);border-color:var(--s500);color:var(--s800);}
.bgen{padding:1rem 2rem;background:linear-gradient(135deg,var(--s700),var(--s500) 60%,var(--s400));color:#fff;border:none;border-radius:16px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(14,165,233,0.32);transition:all 0.25s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:0.55rem;white-space:nowrap;}
.bgen:hover:not(:disabled){transform:translateY(-2px) scale(1.02);box-shadow:0 8px 32px rgba(14,165,233,0.48);}
.bgen:active:not(:disabled){transform:scale(0.98);}
.bgen:disabled{opacity:0.55;cursor:not-allowed;}
.sp{width:18px;height:18px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:rot 0.65s linear infinite;display:inline-block;flex-shrink:0;}
@keyframes rot{to{transform:rotate(360deg)}}
.errbx{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:16px;padding:1rem 1.3rem;margin-top:1rem;color:#b91c1c;font-family:'DM Mono',monospace;font-size:0.8rem;line-height:1.6;}

/* DIVIDER */
.wdiv{text-align:center;padding:2.5rem 0 1rem;}
.wdiv span{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--s400);padding:0 1rem;position:relative;}
.wdiv span::before,.wdiv span::after{content:'';position:absolute;top:50%;width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--s300));}
.wdiv span::before{right:100%;}
.wdiv span::after{left:100%;transform:scaleX(-1);}

/* RESULTS */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:750px){.rgrid{grid-template-columns:1fr;}}

/* MOL CARD */
.mcard{padding:2rem;animation:fu 0.55s ease both;}
.mtag{font-family:'DM Mono',monospace;font-size:0.59rem;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;color:var(--s500);margin-bottom:0.25rem;}
.mtitle{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700;color:var(--s800);letter-spacing:-0.5px;margin-bottom:1rem;}
.stag{background:rgba(14,165,233,0.06);border:1px solid rgba(14,165,233,0.14);border-radius:12px;padding:0.55rem 0.85rem;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--s800);word-break:break-all;margin-bottom:1rem;line-height:1.6;}
.mimg{width:100%;border-radius:16px;border:1px solid rgba(186,230,253,0.55);background:rgba(255,255,255,0.9);margin-bottom:1rem;display:block;}
.vshell{border-radius:16px;overflow:hidden;border:1px solid rgba(14,165,233,0.16);background:linear-gradient(160deg,#ddf3ff,#c8eaff);margin-bottom:1rem;}
.vshell iframe{display:block;width:100%;border:none;}
.ph{font-family:'DM Mono',monospace;font-size:0.59rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--s500);margin-bottom:0.65rem;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:0.55rem;margin-bottom:0.85rem;}
.ptile{background:linear-gradient(145deg,rgba(14,165,233,0.08),rgba(14,165,233,0.03));border:1px solid rgba(14,165,233,0.13);border-radius:14px;padding:0.8rem;text-align:center;transition:transform 0.2s;}
.ptile:hover{transform:scale(1.02);}
.pv{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700;color:var(--s700);}
.pk{font-family:'DM Mono',monospace;font-size:0.59rem;color:var(--s400);margin-top:0.18rem;letter-spacing:0.5px;}
.br{text-align:center;}
.bdg{display:inline-flex;align-items:center;gap:0.4rem;padding:0.38rem 1.1rem;border-radius:50px;font-family:'Cabinet Grotesk',sans-serif;font-size:0.8rem;font-weight:700;}
.byes{background:linear-gradient(135deg,var(--s600),var(--s400));color:#fff;box-shadow:0 3px 12px rgba(14,165,233,0.28);}
.bno{background:rgba(148,163,184,0.18);color:#64748b;border:1px solid rgba(148,163,184,0.28);}
.bdl{width:100%;margin-top:1.1rem;padding:0.72rem;background:rgba(14,165,233,0.07);border:1.5px solid rgba(14,165,233,0.22);border-radius:14px;color:var(--s700);font-family:'Cabinet Grotesk',sans-serif;font-size:0.87rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.bdl:hover{background:rgba(14,165,233,0.14);border-color:var(--s400);}

/* HOW */
.how{margin-top:6rem;animation:fu 0.8s 0.2s ease both;}
.sec-ey{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:3.5px;text-transform:uppercase;color:var(--s500);text-align:center;margin-bottom:0.7rem;}
.sec-t{font-family:'Syne',sans-serif;font-size:clamp(1.7rem,4vw,2.8rem);font-weight:800;color:var(--s800);text-align:center;letter-spacing:-1.5px;margin-bottom:3rem;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;}
@media(max-width:650px){.sgrid{grid-template-columns:1fr;}}
.scard{padding:1.8rem;}
.sn{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,var(--s300),var(--s200));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:0.7rem;}
.st{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--s800);margin-bottom:0.45rem;}
.sd{font-size:0.87rem;color:var(--muted);line-height:1.65;}

/* FOOTER */
.foot{margin-top:5rem;padding:2rem 0;border-top:1px solid rgba(186,230,253,0.4);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.flogo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--s700);}
.flogo span{color:var(--s400);}
.fcp{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:1.5px;color:var(--s300);text-transform:uppercase;}

/* ANIMS */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes hi{from{opacity:0;transform:translateY(28px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app" id="root"></div>

<script>
/* Particle mesh system */
(function(){
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  let W,H,P=[],mouse={x:-999,y:-999};
  const N=55;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  class Pt{
    constructor(){this.reset(true);}
    reset(i){
      this.x=Math.random()*W;this.y=i?Math.random()*H:-10;
      this.r=1.5+Math.random()*2.2;this.vx=(Math.random()-.5)*.28;this.vy=.09+Math.random()*.22;
      this.a=.1+Math.random()*.2;this.h=193+Math.random()*22;
    }
    tick(){
      const dx=this.x-mouse.x,dy=this.y-mouse.y,d=Math.hypot(dx,dy);
      if(d<110){const f=.8*(1-d/110);this.vx+=dx/d*f*.035;this.vy+=dy/d*f*.035;}
      this.vx*=.99;this.vy*=.99;this.x+=this.vx;this.y+=this.vy;
      if(this.y>H+10)this.reset(false);
      if(this.x<0)this.x=W;if(this.x>W)this.x=0;
    }
    draw(){
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${this.h},85%,68%,${this.a})`;ctx.fill();
    }
  }
  function mesh(){
    for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){
      const dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d=Math.hypot(dx,dy);
      if(d<115){
        ctx.beginPath();ctx.moveTo(P[i].x,P[i].y);ctx.lineTo(P[j].x,P[j].y);
        ctx.strokeStyle=`rgba(125,211,252,${.045*(1-d/115)})`;ctx.lineWidth=.55;ctx.stroke();
      }
    }
  }
  resize();addEventListener('resize',resize);
  addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  for(let i=0;i<N;i++)P.push(new Pt());
  (function loop(){ctx.clearRect(0,0,W,H);mesh();P.forEach(p=>{p.tick();p.draw();});requestAnimationFrame(loop);})();
})();
</script>

<script type="text/babel">
const {useState,useCallback,useRef}=React;
const BACKEND = "https://molgen-w9ql.onrender.com";
const EXAMPLES={"Aspirin":"CC(=O)OC1=CC=CC=C1C(=O)O","Caffeine":"CN1C=NC2=C1C(=O)N(C(=O)N2C)C","Ibuprofen":"CC(C)Cc1ccc(cc1)C(C)C(=O)O","Paracetamol":"CC(=O)Nc1ccc(O)cc1","Dopamine":"NCCc1ccc(O)c(O)c1"};

function Viewer3D({sdf}){
  const uid=useRef(Math.random().toString(36).slice(2,7)).current;
  const b64=btoa(unescape(encodeURIComponent(sdf)));
  const html=`<!DOCTYPE html><html><head><style>body{margin:0;background:linear-gradient(160deg,#ddf3ff,#c5e8ff);}#v{width:100%;height:272px;}#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:monospace;font-size:11px;color:#0369a1;text-align:center;}</style></head><body><div style="position:relative"><div id="v"></div><div id="msg">Loading 3D viewer...</div></div><script>
var sdf=decodeURIComponent(escape(atob("${b64}")));
function boot(){var m=document.getElementById("msg");if(m)m.remove();var v=$3Dmol.createViewer(document.getElementById("v"),{backgroundColor:"transparent"});v.addModel(sdf,"sdf");v.setStyle({},{stick:{radius:0.13,colorscheme:"Jmol"},sphere:{scale:0.23,colorscheme:"Jmol"}});v.zoomTo();v.spin("y",0.8);v.render();}
function tryLoad(urls,i){if(i>=urls.length){var m=document.getElementById("msg");if(m)m.innerHTML="3D viewer unavailable.<br>Download SDF to view in PyMOL.";return;}var s=document.createElement("script");s.src=urls[i];s.onload=function(){typeof $3Dmol!=="undefined"?boot():tryLoad(urls,i+1);};s.onerror=function(){tryLoad(urls,i+1);};document.head.appendChild(s);}
typeof $3Dmol!=="undefined"?boot():tryLoad(["https://3dmol.org/build/3Dmol-min.js","https://cdn.jsdelivr.net/npm/3dmol/build/3Dmol-min.js","https://unpkg.com/3dmol/build/3Dmol-min.js"],0);
<\/script></body></html>`;
  return <div className="vshell"><iframe srcDoc={html} height={274} title={`3d-${uid}`} sandbox="allow-scripts"/></div>;
}

function MolCard({tag,title,data,delay}){
  if(!data)return null;
  const {smiles,image,properties:p,sdf}=data;
  const dl=()=>{if(!sdf)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([sdf],{type:'chemical/x-mdl-sdfile'}));a.download=`${title.replace(/\s+/g,'_')}.sdf`;a.click();};
  return(
    <div className="gl mcard" style={{animationDelay:delay}}>
      <div className="mtag">{tag}</div>
      <div className="mtitle">{title}</div>
      <div className="stag">{smiles}</div>
      {image&&<img className="mimg" src={`data:image/png;base64,${image}`} alt={title}/>}
      {sdf&&<Viewer3D sdf={sdf}/>}
      {p?.valid&&<>
        <div className="ph">Lipinski Properties</div>
        <div className="pgrid">
          {[[p.molecular_weight,"Mol. Weight"],[p.logP,"logP"],[p.h_bond_donors,"H-Bond Donors"],[p.h_bond_acceptors,"H-Bond Acceptors"]].map(([v,k])=>(
            <div className="ptile" key={k}><div className="pv">{v}</div><div className="pk">{k}</div></div>
          ))}
        </div>
        <div className="br"><span className={`bdg ${p.drug_like?'byes':'bno'}`}>{p.drug_like?'✓ Drug-Like':'✗ Not Drug-Like'}</span></div>
      </>}
      {sdf&&<button className="bdl" onClick={dl}>↓ Download SDF</button>}
    </div>
  );
}

const STEPS=[
  {n:"01",t:"Enter SMILES",d:"Input any valid SMILES string for a known compound. Try one of the example drugs to get started instantly."},
  {n:"02",t:"Diffusion Model",d:"A PyTorch diffusion model perturbs and denoises your molecular fingerprint to generate novel drug-like structures."},
  {n:"03",t:"Explore & Export",d:"Spin the 3D structure, inspect Lipinski drug-likeness properties, and download the SDF for PyMOL or Chimera."},
];

function App(){
  const [smiles,setSmiles]=useState("CC(=O)OC1=CC=CC=C1C(=O)O");
  const [active,setActive]=useState("Aspirin");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState('');

  const pick=(name,smi)=>{setSmiles(smi);setActive(name);};

  const generate=useCallback(async()=>{
    if(!smiles.trim())return;
    setLoading(true);setError('');setResult(null);
    try{
      const res=await fetch(`${BACKEND}/predict`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({smiles:smiles.trim()})});
      let data;try{data=await res.json();}catch{throw new Error(`Empty response (status ${res.status}). Is app.py running on port 5001?`);}
      if(!res.ok)throw new Error(data.error||`HTTP ${res.status}`);
      setResult(data);
    }catch(e){
      setError(e.message.includes('fetch')||e.message.includes('Failed')?'⚠️  Cannot connect to Flask backend. Run: python app.py  (port 5001)':e.message);
    }finally{setLoading(false);}
  },[smiles]);

  return(<>
    <nav>
      <div className="logo">Mol<span>Gen</span></div>
      <div className="nav-tag">Drug Discovery · AI</div>
    </nav>

    <div className="hero">
      <div className="eyebrow">Diffusion Model · RDKit · PyTorch</div>
      <h1>Generate<br/><em>Drug Molecules</em><br/>with AI</h1>
      <p className="hero-sub">Enter a SMILES string and our diffusion model generates a novel drug-like molecule — visualise in 3D and analyse drug-likeness instantly.</p>
      <div className="hero-stats">
        <div className="stat"><div className="stat-n">16K+</div><div className="stat-l">Training Molecules</div></div>
        <div className="sdiv"/>
        <div className="stat"><div className="stat-n">2048</div><div className="stat-l">Fingerprint Bits</div></div>
        <div className="sdiv"/>
        <div className="stat"><div className="stat-n">3D</div><div className="stat-l">Visualisation</div></div>
        <div className="sdiv"/>
        <div className="stat"><div className="stat-n">Ro5</div><div className="stat-l">Lipinski Check</div></div>
      </div>
    </div>

    <div className="gl icard">
      <label className="lbl">SMILES Notation</label>
      <div className="srow">
        <input className="sinput" value={smiles} onChange={e=>setSmiles(e.target.value)} onKeyDown={e=>e.key==='Enter'&&generate()} placeholder="e.g. CC(=O)OC1=CC=CC=C1C(=O)O" spellCheck={false}/>
        <button className="bgen" onClick={generate} disabled={loading}>
          {loading?<><span className="sp"/>Generating</>:<>⚗ Generate</>}
        </button>
      </div>
      <div style={{marginTop:'1rem'}}>
        <span className="lbl">Quick Examples</span>
        <div className="epills">
          {Object.entries(EXAMPLES).map(([n,s])=>(
            <button key={n} className={`ep${active===n?' on':''}`} onClick={()=>pick(n,s)}>{n}</button>
          ))}
        </div>
      </div>
      {error&&<div className="errbx">{error}</div>}
    </div>

    {result&&<>
      <div className="wdiv"><span>Generated Results</span></div>
      <div className="rgrid">
        <MolCard tag="Original Input"  title="Input Molecule"     data={result.input}     delay="0s"/>
        <MolCard tag="AI Generated"    title="Generated Molecule" data={result.generated} delay="0.1s"/>
      </div>
    </>}

    <div className="how">
      <div className="sec-ey">Under the hood</div>
